<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');
:root{--bg:#0c0c0f;--surface:#141418;--surface2:#1c1c22;--border:#2a2a35;--accent:#e8ff47;--accent2:#47ffe8;--text:#f0f0f5;--muted:#6b6b80;--danger:#ff4757;--success:#4ade80;--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 20px;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 80% 10%,rgba(232,255,71,0.04) 0%,transparent 70%),radial-gradient(ellipse 400px 600px at 10% 80%,rgba(71,255,232,0.03) 0%,transparent 70%);pointer-events:none;z-index:0;}
.container{max-width:1100px;margin:0 auto;position:relative;z-index:1;}
header{margin-bottom:32px;animation:fadeUp 0.6s ease both;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.9rem;letter-spacing:-0.02em;line-height:1;margin-bottom:6px;}
.logo span{color:var(--accent);}
.subtitle{color:var(--muted);font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;animation:fadeUp 0.5s ease both;}
.section-label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.drop-zone{border:1.5px dashed var(--border);border-radius:8px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.25s;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(232,255,71,0.03);}
.drop-zone.loaded{border-color:var(--success);border-style:solid;}
.drop-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:6px;}
.drop-hint{color:var(--muted);font-size:0.72rem;}
.drop-hint strong{color:var(--accent);text-decoration:underline;text-underline-offset:3px;cursor:pointer;}
.date-row{display:flex;gap:10px;flex-wrap:wrap;}
.date-item{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;flex:1;min-width:160px;}
.date-key{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.date-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent);}
.stats-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;min-width:80px;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);}
.stat-num.ok{color:var(--success);}
.stat-label{font-size:0.62rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:var(--surface2);font-family:'Syne',sans-serif;font-weight:700;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:5px 8px;border-bottom:1px solid rgba(42,42,53,0.6);color:var(--text);white-space:nowrap;vertical-align:middle;}
tr:hover td{background:var(--surface2);}
.btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:16px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:7px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.btn:hover{border-color:#3a3a4a;color:var(--text);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-primary:hover:not(:disabled){background:#f0ff70;border-color:#f0ff70;transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,255,71,0.2);}
.btn-secondary{border-color:rgba(71,255,232,0.25);color:var(--accent2);background:rgba(71,255,232,0.05);}
.btn-secondary:hover{background:rgba(71,255,232,0.12);border-color:var(--accent2);transform:translateY(-1px);}
.msg{font-size:0.7rem;color:var(--muted);}.msg.ok{color:var(--success);}
.badge{display:inline-block;font-size:0.6rem;padding:2px 7px;border-radius:4px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-left:8px;}
.badge-ok{background:rgba(74,222,128,0.12);color:var(--success);border:1px solid rgba(74,222,128,0.25);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="logo">受注取込<span>旭化成住工</span></div>
  <div class="subtitle">出庫報告書（Excel）→ 受注CSV 変換ツール ／ ブラウザ完結</div>
</header>

<!-- 日付情報 -->
<div class="card" style="animation-delay:0.03s">
  <div class="section-label">日付情報</div>
  <div class="date-row">
    <div class="date-item">
      <div class="date-key">受注日（右上日付）</div>
      <div class="date-val" id="d-orderdate" style="color:var(--accent2)">—</div>
    </div>
    <div class="date-item">
      <div class="date-key">厚木納入日（納期・出荷予定日）</div>
      <div class="date-val" id="d-atsugi">—</div>
    </div>
  </div>
</div>

<!-- Excel アップロード -->
<div class="card" style="animation-delay:0.05s">
  <div class="section-label">出庫報告書 ファイル</div>
  <div class="drop-zone" id="dropZone">
    <div class="drop-title" id="dropTitle">Excelをここにドロップ</div>
    <div class="drop-hint">または <strong id="browseBtn">ファイルを選択</strong></div>
    <input type="file" id="xlsxFile" style="display:none" accept=".xlsx,.xls">
  </div>
  <div id="fileMsg" style="font-size:0.7rem;color:var(--muted);margin-top:8px;"></div>
</div>

<!-- 受注データテーブル -->
<div class="card" id="dataCard" style="display:none;animation-delay:0.09s">
  <div class="section-label">受注データ <span id="headerBadge"></span></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num ok" id="sTotal">0</div><div class="stat-label">合計件数</div></div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:22px">#</th>
          <th>受注日</th>
          <th>得意先</th>
          <th>納入先</th>
          <th>品番（備考）</th>
          <th>コード№</th>
          <th>製品名</th>
          <th>数量</th>
          <th>納期</th>
          <th>出荷予定日</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="dlBtn" onclick="downloadCSV()" disabled>↓ CSV ダウンロード</button>
    <span class="msg" id="dlMsg"></span>
  </div>
</div>

</div>
<script>
const TOKUISAKI_CODE = '000431';
const NYUSAKISAKI_CODE = '000428';

let parsedRows = [];
let orderDateStr  = '';  // YYYYMMDD
let atsugiDateStr = '';  // YYYYMMDD

// ── 日付ユーティリティ ──────────────────────────
function toYMD(d) {
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}
function dispYMD(s) {
  if (!s || s.length !== 8) return s || '';
  return `${s.slice(0,4)}/${s.slice(4,6)}/${s.slice(6,8)}`;
}
// XLSX.js が返す値（Date / シリアル値 / "2026/04/06"等）を YYYYMMDD に変換
function toYMDfromXlsx(v) {
  if (!v && v !== 0) return '';
  if (v instanceof Date) return toYMD(v);
  if (typeof v === 'number' && v > 1000) {
    return toYMD(new Date(Math.round((v - 25569) * 86400 * 1000)));
  }
  if (typeof v === 'string') {
    const m = v.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    if (m) return `${m[1]}${m[2].padStart(2,'0')}${m[3].padStart(2,'0')}`;
  }
  return '';
}

// ── ドロップ操作 ─────────────────────────────────
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
document.getElementById('browseBtn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('xlsxFile').click(); });
dropZone.addEventListener('click', () => document.getElementById('xlsxFile').click());
document.getElementById('xlsxFile').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

// ── Excel 読み込み・パース ───────────────────────
function handleFile(file) {
  document.getElementById('fileMsg').textContent = '解析中...';
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb   = XLSX.read(ev.target.result, { type: 'array', cellDates: true });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

      parsedRows    = [];
      orderDateStr  = '';
      atsugiDateStr = '';

      // ヘッダー行（№ がある行）を検索
      const headerRowIdxs = [];
      rows.forEach((row, i) => {
        if (row[2] === '№') headerRowIdxs.push(i);
      });

      if (headerRowIdxs.length === 0) {
        document.getElementById('fileMsg').textContent = '❌ 出庫報告書の形式が認識できませんでした。';
        return;
      }

      headerRowIdxs.forEach(hr => {
        // ── ブロック内ヘッダー情報を取得（hr-7〜hr-1）──
        let blockOrderDate  = '';
        let blockAtsugiDate = '';
        for (let i = Math.max(0, hr - 8); i < hr; i++) {
          const row = rows[i];
          if (!row) continue;
          // 右上日付: col9(index9) に日付
          const od = toYMDfromXlsx(row[9]);
          if (od) { blockOrderDate = od;
          }
          // 厚木納入日: col4='厚木納入日：', col5=日付
          const col4 = String(row[4] || '').trim();
          if (col4 === '厚木納入日：') {
            const ad = toYMDfromXlsx(row[5]);
            if (ad) blockAtsugiDate = ad;
          }
        }

        // 先頭ブロックの日付を表示用に使用
        if (!orderDateStr  && blockOrderDate)  orderDateStr  = blockOrderDate;
        if (!atsugiDateStr && blockAtsugiDate) atsugiDateStr = blockAtsugiDate;

        // ── データ行を取得（hr+1〜hr+25、コード№がある行のみ）──
        for (let di = hr + 1; di <= hr + 25 && di < rows.length; di++) {
          const row = rows[di];
          if (!row) continue;
          const code  = row[4]; // コード№（E列）
          const name  = row[5]; // 製品名（F列）
          const suryo = row[6]; // 数量（G列）
          const biko  = row[8]; // 備考＝品番（I列）
          // コード№が空ならスキップ
          if (!code || String(code).trim() === '') continue;
          // 備考（品番）が空ならスキップ
          if (!biko || String(biko).trim() === '') continue;

          parsedRows.push({
            hinban:       String(biko).trim(),
            code:         String(code).trim(),
            name:         String(name || '').trim(),
            suryo:        Number(suryo) || 0,
            orderDate:    blockOrderDate  || orderDateStr,
            atsugiDate:   blockAtsugiDate || atsugiDateStr,
          });
        }
      });

      if (parsedRows.length === 0) {
        document.getElementById('fileMsg').textContent = '❌ データ行が見つかりませんでした。';
        return;
      }

      // 日付表示更新
      document.getElementById('d-orderdate').textContent = orderDateStr  ? dispYMD(orderDateStr)  : '—';
      document.getElementById('d-atsugi').textContent    = atsugiDateStr ? dispYMD(atsugiDateStr) : '—';

      dropZone.classList.add('loaded');
      document.getElementById('dropTitle').innerHTML = `<span style="color:var(--success)">✓ ${file.name}</span>`;
      document.getElementById('fileMsg').textContent = `${parsedRows.length}件を読み込みました`;
      document.getElementById('dataCard').style.display = 'block';
      document.getElementById('dlBtn').disabled = false;
      renderTable();
    } catch(err) {
      document.getElementById('fileMsg').textContent = '❌ 解析エラー: ' + err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── テーブル描画 ─────────────────────────────────
function renderTable() {
  document.getElementById('sTotal').textContent = parsedRows.length;
  const badge = document.getElementById('headerBadge');
  badge.className = 'badge badge-ok';
  badge.textContent = `${parsedRows.length}件`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  parsedRows.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:10px">${i+1}</td>
      <td>${r.orderDate ? dispYMD(r.orderDate) : ''}</td>
      <td>${TOKUISAKI_CODE}</td>
      <td>${NYUSAKISAKI_CODE}</td>
      <td style="color:var(--accent);font-weight:500">${r.hinban}</td>
      <td style="color:var(--muted)">${r.code}</td>
      <td style="color:var(--muted)">${r.name}</td>
      <td style="color:var(--accent2);font-weight:500">${r.suryo}</td>
      <td>${r.atsugiDate ? dispYMD(r.atsugiDate) : ''}</td>
      <td>${r.atsugiDate ? dispYMD(r.atsugiDate) : ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

// ── CSV出力 ──────────────────────────────────────
function downloadCSV() {
  const hdr = ['処理区分','受注区分','受注番号','受注枝番','受注日','得意先コード','営業担当コード','納入先コード','品番','契約数量','数量','単価','単価区分','納期','出荷予定日','分納区分','ロケーションコード','分類コード1','分類コード2','分類コード3','分類コード4','分類コード5','部署コード','客先発注番号','客先管理番号','備考'];
  const lines = [hdr.join(',')];

  parsedRows.forEach((r, i) => {
    const row = [
      '','','',
      '',                            // 受注枝番（空）
      r.orderDate,                   // 受注日
      TOKUISAKI_CODE,                // 得意先コード
      '',                            // 営業担当コード
      NYUSAKISAKI_CODE,              // 納入先コード
      r.hinban,                      // 品番（備考欄）
      '',                            // 契約数量
      r.suryo,                       // 数量
      '','',
      r.atsugiDate,                  // 納期
      r.atsugiDate,                  // 出荷予定日
      '','','','','','','','','','',''
    ];
    lines.push(row.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(','));
  });

  const blob = new Blob(['\uFEFF' + lines.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `受注取込_旭化成住工_${toYMD(new Date())}.csv`; a.click();
  const m = document.getElementById('dlMsg');
  m.textContent = 'ダウンロードしました'; m.className = 'msg ok';
  setTimeout(() => { m.textContent = ''; m.className = 'msg'; }, 3000);
}
</script>
</body>
</html>
