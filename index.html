<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface-hover: #1c1c1f;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #e8e8e4;
    --text-muted: #666660;
    --text-dim: #3a3a38;
    --accent: #c8ff64;
    --accent-dim: rgba(200,255,100,0.08);
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── 背景グリッド ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── レイアウト ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 80px 24px 80px;
  }

  /* ── ヘッダー ── */
  header {
    margin-bottom: 64px;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  header h1 {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  .header-desc {
    margin-top: 16px;
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 400;
    max-width: 400px;
    line-height: 1.7;
  }

  /* ── セクション ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── グリッド ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 1px;
  }

  /* ── カード ── */
  .card {
    background: var(--surface);
    padding: 28px 28px 24px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: background 0.18s;
    position: relative;
    overflow: hidden;
    min-height: 180px;
  }

  .card:hover {
    background: var(--surface-hover);
  }

  .card:hover .card-arrow {
    opacity: 1;
    transform: translate(0, 0);
  }

  .card:hover .card-icon {
    background: var(--accent-dim);
    border-color: rgba(200,255,100,0.2);
  }

  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    margin-bottom: 20px;
    transition: background 0.18s, border-color 0.18s;
    flex-shrink: 0;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.65;
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
  }

  .card-footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .card-arrow {
    font-size: 14px;
    color: var(--accent);
    opacity: 0;
    transform: translate(-4px, 4px);
    transition: opacity 0.18s, transform 0.18s;
  }

  /* ── フッター ── */
  footer {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-text {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .footer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── 入場アニメーション ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  header         { animation: fadeUp 0.5s ease both; }
  .section-label { animation: fadeUp 0.5s 0.15s ease both; }
  .grid          { animation: fadeUp 0.5s 0.25s ease both; }
  footer         { animation: fadeUp 0.5s 0.35s ease both; }

  /* ── レスポンシブ ── */
  @media (max-width: 480px) {
    .wrapper { padding: 48px 16px 48px; }
    header { margin-bottom: 40px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="eyebrow">// portal v1.0</p>
    <h1>My<br><span>Tools.</span></h1>
    <p class="header-desc">自分で作ったツール・サービスをまとめたポータルです。</p>
  </header>

  <p class="section-label">projects</p>

  <div class="grid">

    <!-- ▼▼▼ ここにサイトを追加・編集してください ▼▼▼ -->

    <a class="card" href="https://meru55.github.io/The-portal/要件定義.html" target="_blank" rel="noopener">
      <div class="card-icon">📦</div>
      <p class="card-title">要件定義ツール</p>
      <p class="card-desc">要件の定義を明確化するツール</p>
      <div class="card-footer">
        <span class="card-tag">業務ツール</span>
        <span class="card-arrow">↗</span>
      </div>
    </a>

    <a class="card" href="https://example.com" target="_blank" rel="noopener">
      <div class="card-icon">🚀</div>
      <p class="card-title">マイツールボックス</p>
      <p class="card-desc">各種ユーティリティをまとめたランチャー</p>
      <div class="card-footer">
        <span class="card-tag">ランチャー</span>
        <span class="card-arrow">↗</span>
      </div>
    </a>

    <a class="card" href="https://example.com" target="_blank" rel="noopener">
      <div class="card-icon">📝</div>
      <p class="card-title">Todo App</p>
      <p class="card-desc">Flaskで作ったシンプルなタスク管理アプリ</p>
      <div class="card-footer">
        <span class="card-tag">学習</span>
        <span class="card-arrow">↗</span>
      </div>
    </a>

    <a class="card" href="https://example.com" target="_blank" rel="noopener">
      <div class="card-icon">🎵</div>
      <p class="card-title">ミックス分析ツール</p>
      <p class="card-desc">楽曲のスペクトル分析・可視化ツール</p>
      <div class="card-footer">
        <span class="card-tag">音楽</span>
        <span class="card-arrow">↗</span>
      </div>
    </a>

    <!-- ▲▲▲ ここまで ▲▲▲ -->

  </div>

  <footer>
    <p class="footer-text">© 2026 — My Portal</p>
    <div class="footer-dot"></div>
  </footer>

</div>
</body>
</html>
