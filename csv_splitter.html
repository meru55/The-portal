<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');
:root{--bg:#0c0c0f;--surface:#141418;--surface2:#1c1c22;--border:#2a2a35;--accent:#e8ff47;--accent2:#47ffe8;--text:#f0f0f5;--muted:#6b6b80;--danger:#ff4757;--success:#4ade80;--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 20px;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 400px at 80% 10%,rgba(232,255,71,0.04) 0%,transparent 70%),radial-gradient(ellipse 400px 600px at 10% 80%,rgba(71,255,232,0.03) 0%,transparent 70%);pointer-events:none;z-index:0;}
.container{max-width:960px;margin:0 auto;position:relative;z-index:1;}
header{margin-bottom:32px;animation:fadeUp 0.6s ease both;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.9rem;letter-spacing:-0.02em;line-height:1;margin-bottom:6px;}
.logo span{color:var(--accent);}
.subtitle{color:var(--muted);font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:14px;animation:fadeUp 0.5s ease both;}
.section-label{font-family:'Syne',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.drop-zone{border:1.5px dashed var(--border);border-radius:8px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.25s;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(232,255,71,0.03);}
.drop-zone.loaded{border-color:var(--success);border-style:solid;}
.drop-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:6px;}
.drop-hint{color:var(--muted);font-size:0.72rem;}
.drop-hint strong{color:var(--accent);text-decoration:underline;text-underline-offset:3px;cursor:pointer;}
.mode-tabs{display:flex;gap:0;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;width:fit-content;}
.mode-tab{padding:7px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:0.08em;cursor:pointer;transition:all 0.2s;background:transparent;border:none;color:var(--muted);}
.mode-tab.active{background:var(--accent);color:var(--bg);}
.mode-tab:not(.active):hover{background:var(--surface2);color:var(--text);}
.setting-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:12px;}
.setting-label{font-size:0.78rem;color:var(--muted);}
.num-input{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;padding:6px 12px;width:72px;text-align:center;outline:none;transition:border-color 0.2s;}
.num-input:focus{border-color:var(--accent);}
.unit{font-size:0.78rem;color:var(--muted);}
.stats-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;text-align:center;min-width:90px;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);}
.stat-num.hi{color:var(--accent);}
.stat-label{font-size:0.62rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em;}
.chunks-grid{display:flex;flex-direction:column;gap:8px;}
.chunk-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;transition:border-color 0.2s;}
.chunk-row:hover{border-color:var(--accent2);}
.chunk-badge{font-family:'Syne',sans-serif;font-weight:800;font-size:0.72rem;background:var(--border);border-radius:4px;padding:2px 8px;color:var(--muted);min-width:52px;text-align:center;}
.chunk-name{font-size:0.75rem;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chunk-range{font-size:0.7rem;color:var(--accent2);min-width:90px;text-align:right;}
.chunk-count{font-size:0.7rem;color:var(--accent);font-weight:700;min-width:44px;text-align:right;}
.btn-dl-single{background:none;border:1px solid var(--border);color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:5px;font-family:'DM Mono',monospace;font-size:0.68rem;transition:all 0.2s;white-space:nowrap;}
.btn-dl-single:hover{border-color:var(--accent);color:var(--accent);}
.manual-hint{font-size:0.72rem;color:var(--muted);margin-bottom:12px;line-height:1.7;}
.manual-hint b{color:var(--accent2);}
.row-list{display:flex;flex-direction:column;}
.data-row{display:flex;align-items:center;gap:10px;padding:5px 8px;border-radius:4px;transition:background 0.1s;}
.data-row:hover{background:rgba(255,255,255,0.03);}
.row-num{font-size:10px;color:var(--muted);min-width:28px;text-align:right;flex-shrink:0;}
.row-preview{font-size:11px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.65;}
.row-file-tag{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;padding:1px 8px;border-radius:3px;min-width:32px;text-align:center;flex-shrink:0;}
.divider-row{display:flex;align-items:center;gap:8px;padding:2px 8px;cursor:pointer;}
.divider-line{flex:1;height:2px;background:var(--border);border-radius:1px;transition:all 0.2s;}
.divider-row.checked .divider-line{background:var(--accent);box-shadow:0 0 8px rgba(232,255,71,0.35);}
.divider-label{font-size:10px;color:var(--border);transition:color 0.2s;white-space:nowrap;user-select:none;min-width:90px;text-align:right;}
.divider-row.checked .divider-label{color:var(--accent);}
.divider-row:hover .divider-line{background:var(--accent2);}
.divider-row:hover .divider-label{color:var(--accent2);}
.tag-0{background:rgba(232,255,71,0.15);color:#e8ff47;}
.tag-1{background:rgba(71,255,232,0.15);color:#47ffe8;}
.tag-2{background:rgba(255,71,87,0.15);color:#ff4757;}
.tag-3{background:rgba(74,222,128,0.15);color:#4ade80;}
.tag-4{background:rgba(255,165,71,0.15);color:#ffa547;}
.tag-5{background:rgba(165,71,255,0.15);color:#a547ff;}
.tag-6{background:rgba(71,165,255,0.15);color:#47a5ff;}
.tag-7{background:rgba(255,71,165,0.15);color:#ff47a5;}
.tag-8{background:rgba(255,220,71,0.15);color:#ffdc47;}
.tag-9{background:rgba(71,255,128,0.15);color:#47ff80;}
.btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:16px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:7px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.btn:hover{border-color:#3a3a4a;color:var(--text);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-primary:hover:not(:disabled){background:#f0ff70;border-color:#f0ff70;transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,255,71,0.2);}
.btn-secondary{border-color:rgba(71,255,232,0.25);color:var(--accent2);background:rgba(71,255,232,0.05);}
.btn-secondary:hover{background:rgba(71,255,232,0.12);border-color:var(--accent2);transform:translateY(-1px);}
.msg{font-size:0.7rem;color:var(--muted);}.msg.ok{color:var(--success);}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>
<div class="container">

<header>
  <div class="logo">CSV<span>スプリッター</span></div>
  <div class="subtitle">受注CSVを分割 ／ 自動・手動モード対応 ／ ブラウザ完結</div>
</header>

<!-- モード・設定 -->
<div class="card" style="animation-delay:0.03s">
  <div class="section-label">分割モード</div>
  <div class="mode-tabs">
    <button class="mode-tab"        id="tabAuto"   onclick="setMode('auto')">自動（N件ずつ）</button>
    <button class="mode-tab active"  id="tabManual" onclick="setMode('manual')">手動（区切り指定）</button>
  </div>
  <div class="setting-row" id="autoSetting" style="display:none">
    <span class="setting-label">1ファイルあたり</span>
    <input type="number" class="num-input" id="chunkSize" value="10" min="1" max="9999">
    <span class="unit">件ずつに分割</span>
  </div>
</div>

<!-- ファイル -->
<div class="card" style="animation-delay:0.05s">
  <div class="section-label">CSVファイル</div>
  <div class="drop-zone" id="dropZone">
    <div class="drop-title" id="dropTitle">CSVをここにドロップ</div>
    <div class="drop-hint">または <strong id="browseBtn">ファイルを選択</strong></div>
    <input type="file" id="csvFile" style="display:none" accept=".csv">
  </div>
  <div id="fileMsg" style="font-size:0.7rem;color:var(--muted);margin-top:8px;"></div>
</div>

<!-- 自動プレビュー -->
<div class="card" id="autoPreviewCard" style="display:none;animation-delay:0.09s">
  <div class="section-label">分割プレビュー</div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num hi" id="sTotalRows">0</div><div class="stat-label">総件数</div></div>
    <div class="stat"><div class="stat-num"    id="sTotalFiles">0</div><div class="stat-label">分割数</div></div>
    <div class="stat"><div class="stat-num"    id="sChunkSize">10</div><div class="stat-label">件/ファイル</div></div>
  </div>
  <div class="chunks-grid" id="chunksGrid"></div>
  <div class="btn-row">
    <button class="btn btn-primary"   onclick="downloadAll('auto')">↓ 一括ダウンロード</button>
    <button class="btn btn-secondary" onclick="renderAuto()">再分割</button>
    <span class="msg" id="dlMsgAuto"></span>
  </div>
</div>

<!-- 手動モード -->
<div class="card" id="manualCard" style="display:none;animation-delay:0.09s">
  <div class="section-label">区切り位置を指定</div>
  <div class="manual-hint">行と行の間の <b>区切り線をクリック</b> してファイルの切れ目を指定してください。<br>右端の色付きタグで何番目のファイルに入るかが分かります。</div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num hi" id="mTotalRows">0</div><div class="stat-label">総件数</div></div>
    <div class="stat"><div class="stat-num"    id="mTotalFiles">1</div><div class="stat-label">分割数</div></div>
  </div>
  <div class="row-list" id="rowList"></div>
  <div class="btn-row">
    <button class="btn btn-primary"   onclick="downloadAll('manual')">↓ 一括ダウンロード</button>
    <button class="btn btn-secondary" onclick="clearDividers()">区切りをリセット</button>
    <span class="msg" id="dlMsgManual"></span>
  </div>
</div>

</div>
<script>
let csvHeader    = '';
let csvDataRows  = [];
let baseFilename = 'output';
let currentMode  = 'manual';
let dividerSet   = new Set(); // i行目の後ろに区切り

// ── モード切り替え ────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('tabAuto').classList.toggle('active',   mode === 'auto');
  document.getElementById('tabManual').classList.toggle('active', mode === 'manual');
  document.getElementById('autoSetting').style.display = mode === 'auto' ? 'flex' : 'none';
  if (csvDataRows.length === 0) return;
  if (mode === 'auto') {
    document.getElementById('manualCard').style.display = 'none';
    renderAuto();
  } else {
    document.getElementById('autoPreviewCard').style.display = 'none';
    renderManual();
  }
}

// ── ドロップ ──────────────────────────────────────
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  const f = e.dataTransfer.files[0]; if (f) handleFile(f);
});
document.getElementById('browseBtn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('csvFile').click(); });
dropZone.addEventListener('click', () => document.getElementById('csvFile').click());
document.getElementById('csvFile').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
document.getElementById('chunkSize').addEventListener('change', () => { if (csvDataRows.length > 0 && currentMode === 'auto') renderAuto(); });

// ── ファイル読み込み ──────────────────────────────
function handleFile(file) {
  baseFilename = file.name.replace(/\.csv$/i, '');
  dividerSet   = new Set();
  const reader = new FileReader();
  reader.onload = function(ev) {
    const text  = ev.target.result.replace(/^\uFEFF/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
    if (lines.length < 2) { document.getElementById('fileMsg').textContent = '❌ データ行が見つかりません。'; return; }
    csvHeader   = lines[0];
    csvDataRows = lines.slice(1);
    dropZone.classList.add('loaded');
    document.getElementById('dropTitle').innerHTML = `<span style="color:var(--success)">✓ ${file.name}</span>`;
    document.getElementById('fileMsg').textContent = `${csvDataRows.length}件（ヘッダー除く）を読み込みました`;
    if (currentMode === 'auto') renderAuto(); else renderManual();
  };
  reader.readAsText(file, 'UTF-8');
}

// ────────────────────────────────────────────────
// 自動モード
// ────────────────────────────────────────────────
function renderAuto() {
  const n          = Math.max(1, parseInt(document.getElementById('chunkSize').value) || 10);
  const total      = csvDataRows.length;
  const totalFiles = Math.ceil(total / n);
  document.getElementById('sTotalRows').textContent  = total;
  document.getElementById('sTotalFiles').textContent = totalFiles;
  document.getElementById('sChunkSize').textContent  = n;
  const grid = document.getElementById('chunksGrid');
  grid.innerHTML = '';
  for (let i = 0; i < totalFiles; i++) {
    const start = i * n, end = Math.min(start + n, total);
    const el = document.createElement('div');
    el.className = 'chunk-row';
    el.innerHTML = `
      <span class="chunk-badge">${i+1} / ${totalFiles}</span>
      <span class="chunk-name">${makeFilename(i+1, totalFiles)}</span>
      <span class="chunk-range">${start+1}〜${end}行</span>
      <span class="chunk-count">${end-start}件</span>
      <button class="btn-dl-single" onclick="dlOneAuto(${i},${totalFiles})">↓ DL</button>`;
    grid.appendChild(el);
  }
  document.getElementById('autoPreviewCard').style.display = 'block';
}

function makeFilename(idx, total) { return `${baseFilename}_${idx}of${total}.csv`; }

function autoContent(idx) {
  const n = Math.max(1, parseInt(document.getElementById('chunkSize').value) || 10);
  return '\uFEFF' + [csvHeader, ...csvDataRows.slice(idx*n, Math.min((idx+1)*n, csvDataRows.length))].join('\n');
}

function dlOneAuto(idx, total) {
  const blob = new Blob([autoContent(idx)], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = makeFilename(idx+1, total); a.click();
}

// ────────────────────────────────────────────────
// 手動モード
// ────────────────────────────────────────────────
function buildChunks() {
  const divs   = [...dividerSet].sort((a, b) => a - b).filter(d => d < csvDataRows.length - 1);
  const chunks = [];
  let start    = 0;
  for (const d of divs) { chunks.push({ start, end: d + 1 }); start = d + 1; }
  chunks.push({ start, end: csvDataRows.length });
  return chunks;
}

function renderManual() {
  const chunks  = buildChunks();
  const total   = chunks.length;
  document.getElementById('mTotalRows').textContent  = csvDataRows.length;
  document.getElementById('mTotalFiles').textContent = total;

  // 各行→チャンク番号
  const rowChunk = new Array(csvDataRows.length);
  chunks.forEach((c, ci) => { for (let i = c.start; i < c.end; i++) rowChunk[i] = ci; });

  const list = document.getElementById('rowList');
  list.innerHTML = '';

  csvDataRows.forEach((rowStr, i) => {
    const preview = rowStr.split(',').map(v => v.replace(/^"|"$/g,'')).filter(Boolean).slice(0,6).join('  |  ');
    const ci      = rowChunk[i];

    // データ行
    const dr = document.createElement('div');
    dr.className = 'data-row';
    dr.innerHTML = `
      <span class="row-num">${i+1}</span>
      <span class="row-preview">${preview}</span>
      <span class="row-file-tag tag-${ci % 10}">${ci+1}</span>`;
    list.appendChild(dr);

    // 区切り線（最終行後ろは不要）
    if (i < csvDataRows.length - 1) {
      const checked = dividerSet.has(i);
      const dd = document.createElement('div');
      dd.className = 'divider-row' + (checked ? ' checked' : '');
      // この区切りが属するチャンクの件数（区切り線の上側＝ciチャンクの件数）
      const chunkCount = chunks[ci].end - chunks[ci].start;
      const countLabel = checked ? `✂  ${chunkCount}件` : '+ 区切りを追加';
      dd.innerHTML = `
        <div class="divider-line"></div>
        <span class="divider-label">${countLabel}</span>`;
      dd.addEventListener('click', () => { toggleDivider(i); });
      list.appendChild(dd);
    }
  });

  document.getElementById('manualCard').style.display = 'block';
}

function toggleDivider(idx) {
  if (dividerSet.has(idx)) dividerSet.delete(idx); else dividerSet.add(idx);
  renderManual();
}

function clearDividers() { dividerSet = new Set(); renderManual(); }

function manualContent(idx) {
  const c = buildChunks()[idx];
  return '\uFEFF' + [csvHeader, ...csvDataRows.slice(c.start, c.end)].join('\n');
}

// ── 一括ダウンロード（連続DL・ZIPなし）────────────
async function downloadAll(mode) {
  let total, getContent, getName;
  if (mode === 'auto') {
    const n = Math.max(1, parseInt(document.getElementById('chunkSize').value) || 10);
    total      = Math.ceil(csvDataRows.length / n);
    getContent = i => autoContent(i);
    getName    = i => makeFilename(i+1, total);
  } else {
    const chunks = buildChunks();
    total      = chunks.length;
    getContent = i => manualContent(i);
    getName    = i => makeFilename(i+1, total);
  }
  for (let i = 0; i < total; i++) {
    await new Promise(resolve => setTimeout(resolve, i === 0 ? 0 : 400));
    const blob = new Blob([getContent(i)], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = getName(i); a.click();
    URL.revokeObjectURL(a.href);
  }
  const m = document.getElementById(mode === 'auto' ? 'dlMsgAuto' : 'dlMsgManual');
  m.textContent = `${total}ファイルをダウンロードしました`; m.className = 'msg ok';
  setTimeout(() => { m.textContent = ''; m.className = 'msg'; }, 3000);
}
</script>
</body>
</html>
